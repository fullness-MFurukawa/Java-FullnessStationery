name: Frontend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'ec-answer/**'
      - '.github/workflows/frontend-cicd.yml'
  pull_request:
    paths:
      - 'ec-answer/**'

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: fullness-ecx
          POSTGRES_USER: fullness
          POSTGRES_PASSWORD: fullness
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fullness -d fullness-ecx"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # スキーマ + シード投入(name_kana 対応版)
      - name: Initialize database (schema + seed)
        env:
          PGPASSWORD: fullness
        run: |
          psql -h localhost -U postgres -d fullness-ecx -f ec-answer/src/main/resources/sql/create_tables.sql
          psql -h localhost -U postgres -d fullness-ecx -f ec-answer/src/main/resources/sql/insert_data.sql
         
      - name: Grant gradlew permission
        working-directory: ec-answer
        run: chmod +x ./gradlew

      - name: Build & Test
        working-directory: ec-answer
        env:
          DB_URL: jdbc:postgresql://localhost:5432/fullness-ecx
          DB_USERNAME: fullness
          DB_PASSWORD: fullness
        run: ./gradlew build

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-report
          path: ec-answer/build/reports/tests/test

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: 実行用JARをビルド
        working-directory: ec-answer
        run: |
          chmod +x ./gradlew
          ./gradlew clean bootJar

      - name: JARをEC2へ転送
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "ec-answer/build/libs/*-SNAPSHOT.jar"
          target: "/tmp/"
          strip_components: 3

      - name: 配置してサービス再起動
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo mv /tmp/*-SNAPSHOT.jar /opt/fullness/frontend.jar
            sudo chown fullness:fullness /opt/fullness/frontend.jar
            sudo systemctl restart fullness-frontend
            sleep 5
            sudo systemctl is-active fullness-frontend