<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>注文履歴詳細</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="~{fragments/header :: header}"></div>

<main class="container flex-grow-1 py-4">
    <h2 class="text-center mb-4">注文履歴詳細</h2>

    <div class="mb-3">
        <div>注文ID：<span th:text="${order.id}"></span></div>
        <div>注文日時：<span th:text="${#temporals.format(order.orderDate, 'yyyy/MM/dd HH:mm')}"></span></div>
    </div>

    <table class="table table-bordered align-middle text-center">
        <thead class="table-light">
            <tr><th>商品名</th><th>価格</th><th>個数</th><th>小計</th></tr>
        </thead>
        <tbody>
            <tr th:each="detail : ${order.details}">
                <td th:text="${detail.product.name}"></td>
                <td th:text="|${#numbers.formatInteger(detail.product.price,1,'COMMA')}円|"></td>
                <td th:text="${detail.count}"></td>
                <td th:text="|${#numbers.formatInteger(detail.product.price * detail.count,1,'COMMA')}円|"></td>
            </tr>
        </tbody>
    </table>

    <div class="text-end fw-bold mb-4">
        合計：<span th:text="|${#numbers.formatInteger(order.amountTotal,1,'COMMA')}円|">0円</span>
    </div>

    <div class="text-center">
        <a th:href="@{/purchase/history}" class="btn btn-outline-secondary">戻る</a>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
