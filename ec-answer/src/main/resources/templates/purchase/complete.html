<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>購入(完了)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="~{fragments/header :: header}"></div>

<main class="container flex-grow-1 py-4">
    <h2 class="text-center mb-4">購入（完了）</h2>

    <div class="alert alert-success text-center">購入が完了しました</div>

    <table class="table table-bordered align-middle text-center">
        <thead class="table-light">
            <tr><th>商品名</th><th>価格</th><th>数量</th><th>小計</th></tr>
        </thead>
        <tbody>
            <tr th:each="detail : ${order.details}">
                <td th:text="${detail.product.name}"></td>
                <td th:text="|${#numbers.formatInteger(detail.product.price,1,'COMMA')}円|"></td>
                <td th:text="${detail.count}"></td>
                <td th:text="|${#numbers.formatInteger(detail.product.price * detail.count,1,'COMMA')}円|"></td>
            </tr>
        </tbody>
    </table>

    <div class="text-end fw-bold mb-1">
        合計：<span th:text="|${#numbers.formatInteger(order.amountTotal,1,'COMMA')}円|">0円</span>
    </div>
    <div class="text-end text-muted mb-4">
        支払い方法：<span th:text="${order.paymentMethod.name}"></span>
    </div>

    <div class="d-flex justify-content-center gap-3">
        <a th:href="@{/}" class="btn btn-outline-secondary">トップに戻る</a>
        <a th:href="@{/purchase/history}" class="btn btn-primary">購入履歴</a>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
