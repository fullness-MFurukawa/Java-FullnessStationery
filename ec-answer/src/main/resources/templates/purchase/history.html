<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>注文履歴一覧</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="~{fragments/header :: header}"></div>

<main class="container flex-grow-1 py-4">
    <h2 class="text-center mb-4">注文履歴一覧</h2>

    <div th:if="${#lists.isEmpty(orders)}" class="alert alert-info text-center">
        購入履歴がありません
    </div>

    <table th:unless="${#lists.isEmpty(orders)}"
           class="table table-bordered align-middle text-center">
        <thead class="table-light">
            <tr><th>注文ID</th><th>注文日時</th><th>合計金額</th><th>詳細</th></tr>
        </thead>
        <tbody>
            <tr th:each="order : ${orders}">
                <td th:text="${order.id}"></td>
                <td th:text="${#temporals.format(order.orderDate, 'yyyy/MM/dd HH:mm')}"></td>
                <td th:text="|${#numbers.formatInteger(order.amountTotal,1,'COMMA')}円|"></td>
                <td>
                    <a th:href="@{/purchase/history/{id}(id=${order.id})}"
                       class="btn btn-outline-primary btn-sm">詳細</a>
                </td>
            </tr>
        </tbody>
    </table>

    <div class="text-center mt-4">
        <a th:href="@{/}" class="btn btn-outline-secondary">トップに戻る</a>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
