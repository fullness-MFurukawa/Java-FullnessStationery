<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>購入(入力)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="~{fragments/header :: header}"></div>

<main class="container flex-grow-1 py-4">
    <h2 class="text-center mb-4">購入（入力）</h2>

    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
    <div th:if="${stockMessage}" class="alert alert-warning" th:text="${stockMessage}"></div>

    <div class="text-end mb-2">
        <a th:href="@{/products/search}" class="btn btn-secondary btn-sm">買い物を続ける</a>
    </div>

    <table class="table table-bordered align-middle text-center">
        <thead class="table-light">
            <tr><th>商品名</th><th>価格</th><th>個数</th><th>削除</th></tr>
        </thead>
        <tbody>
            <tr th:each="item : ${cart.items}">
                <td th:text="${item.productName}"></td>
                <td th:text="|${#numbers.formatInteger(item.price,1,'COMMA')}円|"></td>
                <td>
                    <form th:action="@{/cart/update}" method="post" class="d-inline">
                        <input type="hidden" name="productId" th:value="${item.productId}">
                        <input type="number" name="quantity"
                            class="form-control form-control-sm d-inline w-auto" style="width:6rem;"
                            th:value="${item.quantity}" min="1" th:max="${stocks.get(item.productId)}"
                            onchange="this.form.submit()">
                    </form>
                </td>
                <td>
                    <form th:action="@{/cart/remove}" method="post" class="d-inline">
                        <input type="hidden" name="productId" th:value="${item.productId}">
                        <button type="submit" class="btn btn-danger btn-sm">削除</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>

    <div class="text-end fw-bold mb-3">
        合計：<span th:text="|${#numbers.formatInteger(cart.totalAmount,1,'COMMA')}円|">0円</span>
    </div>

    <div class="text-center">
        <a th:href="@{/purchase/conform}" class="btn btn-success">購入確認へ</a>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
