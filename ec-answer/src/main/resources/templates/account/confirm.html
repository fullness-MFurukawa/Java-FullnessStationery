<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アカウント登録(確認) | Fullness Stationery</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div th:replace="~{fragments/header :: header}"></div>

<main class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h4 text-center mb-4">アカウント登録(確認)</h1>

                    <p class="text-muted">以下の内容で登録します。よろしければ「登録」を押してください。</p>

                    <table class="table">
                        <tbody>
                            <tr><th class="w-25">氏名</th><td th:text="${customerRegisterForm.name}"></td></tr>
                            <tr><th>氏名カナ</th><td th:text="${customerRegisterForm.nameKana}"></td></tr>
                            <tr><th>住所1</th><td th:text="${customerRegisterForm.address1}"></td></tr>
                            <tr><th>住所2</th><td th:text="${customerRegisterForm.address2}"></td></tr>
                            <tr><th>電話番号</th><td th:text="${customerRegisterForm.phoneNumber}"></td></tr>
                            <tr><th>メールアドレス</th><td th:text="${customerRegisterForm.mailAddress}"></td></tr>
                            <tr><th>アカウント名</th><td th:text="${customerRegisterForm.username}"></td></tr>
                            <tr><th>パスワード</th><td>********</td></tr>
                        </tbody>
                    </table>

                    <div class="d-flex justify-content-between mt-4">
                        <form th:action="@{/account/back}" method="post" class="m-0">
                            <button type="submit" class="btn btn-outline-secondary">戻る</button>
                        </form>
                        <form th:action="@{/account/complete}" method="post" class="m-0">
                            <button type="submit" class="btn btn-primary">登録</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
