<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン | Fullness Stationery</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div th:replace="~{fragments/header :: header}"></div>

<main class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h4 text-center mb-4">ログイン</h1>

                    <!-- 認証失敗メッセージ -->
                    <div th:if="${loginError}"
                         class="alert alert-danger" role="alert"
                         th:text="${loginError}"></div>

                    <form th:action="@{/login}" th:object="${loginForm}" method="post">

                        <div class="mb-3">
                            <label for="mailAddress" class="form-label">メールアドレス</label>
                            <input type="email" id="mailAddress"
                                   class="form-control"
                                   th:field="*{mailAddress}"
                                   th:classappend="${#fields.hasErrors('mailAddress')} ? 'is-invalid'">
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('mailAddress')}"
                                 th:errors="*{mailAddress}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">パスワード</label>
                            <input type="password" id="password"
                                   class="form-control"
                                   th:field="*{password}"
                                   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'">
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('password')}"
                                 th:errors="*{password}"></div>
                        </div>

                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-primary">ログイン</button>
                        </div>
                    </form>

                    <p class="text-center mb-0">
                            アカウントをお持ちでない方は
                        <a th:href="@{/account/form}">新規登録</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
