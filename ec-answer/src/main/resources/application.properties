sspring.application.name=ec-answer

# データソース(バックエンドと同じ fullness-ecx を共有)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/fullness-ecx}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:training}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10

# MyBatis
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.mapper-locations=classpath*:mapper/**/*.xml
mybatis.type-aliases-package=jp.co.fullness.ec.frontend.infrastructure.entity

# サーバ / セッション(顧客セッション30分)
server.port=8082
server.servlet.session.timeout=30m
server.servlet.session.persistent=false
server.forward-headers-strategy=framework

# Thymeleaf(開発時キャッシュ無効)
spring.thymeleaf.cache=false

# 画像アップロードは無いが上限は既定
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# AWS S3(商品画像の署名付きURL)
aws.region=${AWS_REGION:ap-northeast-1}
aws.s3.bucket=${AWS_S3_BUCKET:fullness-ec-product-images-furukawa}
aws.s3.presign-duration-minutes=${AWS_S3_PRESIGN_MINUTES:10}

logging.level.jp.co.fullness.ec.frontend=DEBUG