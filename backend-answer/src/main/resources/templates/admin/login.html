<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>ログイン</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">
    <div th:replace="~{fragments/header :: header}"></div>

    <main class="container flex-grow-1 py-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <h2 class="text-center mb-4">ログイン</h2>

                <!-- 認証エラーメッセージ -->
                <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

                <form th:action="@{/admin/login}" th:object="${loginForm}" method="post">
                    <div class="mb-3">
                        <label class="form-label">アカウント名</label>
                        <input type="text" class="form-control" th:field="*{username}">
                        <div class="text-danger small"
                             th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">パスワード</label>
                        <input type="password" class="form-control" th:field="*{password}">
                        <div class="text-danger small"
                             th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-success">ログイン</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
