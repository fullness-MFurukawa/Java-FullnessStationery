<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>新商品登録(確認)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">
    <div th:replace="~{fragments/header :: header}"></div>

    <main class="container flex-grow-1 py-5">
        <h2 class="text-center mb-4">新商品登録(確認)</h2>
        <div class="row justify-content-center">
            <div class="col-md-7">
                <table class="table">
                    <tbody>
                        <tr>
                            <th class="text-end w-25">商品名</th>
                            <td th:text="${productRegisterForm.name}">テストボールペン</td>
                        </tr>
                        <tr>
                            <th class="text-end">単価</th>
                            <td th:text="|${#numbers.formatInteger(productRegisterForm.price, 1, 'COMMA')}円|">500円</td>
                        </tr>
                        <tr>
                            <th class="text-end">在庫数</th>
                            <td th:text="${productRegisterForm.stockQuantity}">100</td>
                        </tr>
                        <tr>
                            <th class="text-end">商品カテゴリ</th>
                            <td th:text="${categoryName}">文房具</td>
                        </tr>
                        <tr>
                            <th class="text-end">画像</th>
                            <td><img th:src="${imageUrl}" alt="商品画像" style="max-width:200px; max-height:200px;"></td>
                        </tr>
                    </tbody>
                </table>

                <div class="text-center mt-4">
                    <a th:href="@{/admin/product/cancel}" class="btn btn-secondary px-4">キャンセル</a>
                    <a th:href="@{/admin/product/add}" class="btn btn-outline-secondary px-4">戻る</a>
                    <form th:action="@{/admin/product/complete}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-success px-4">登録</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
