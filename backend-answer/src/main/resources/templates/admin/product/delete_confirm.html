<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>商品削除(確認)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">
    <div th:replace="~{fragments/header :: header}"></div>

    <main class="container flex-grow-1 py-5">
        <h2 class="text-center mb-4">商品削除(確認)</h2>
        <p class="text-center text-danger mb-4">以下の商品を削除します。よろしければ「削除する」を押してください。</p>

        <div class="d-flex justify-content-center">
            <table class="table table-bordered align-middle w-auto">
                <tr>
                    <th class="table-light">商品画像</th>
                    <td class="text-center">
                        <img th:if="${imageUrl != null}" th:src="${imageUrl}" alt="商品画像" width="100">
                        <span th:unless="${imageUrl != null}">なし</span>
                    </td>
                </tr>
                <tr><th class="table-light">商品名</th><td th:text="${product.name}"></td></tr>
                <tr><th class="table-light">単価</th>
                    <td th:text="|${#numbers.formatInteger(product.price, 1, 'COMMA')}円|"></td></tr>
                <tr><th class="table-light">商品カテゴリ</th>
                    <td th:text="${product.category != null ? product.category.name : ''}"></td></tr>
                <tr><th class="table-light">在庫数</th>
                    <td th:text="${product.stock != null ? product.stock.quantity : ''}"></td></tr>
            </table>
        </div>

        <form th:action="@{/admin/product/delete}" method="post" th:object="${productDeleteForm}"
              class="text-center mt-4">
            <input type="hidden" th:field="*{id}">
            <button type="submit" class="btn btn-danger">削除する</button>
            <a th:href="@{/admin/product}" class="btn btn-secondary ms-2">戻る</a>
        </form>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
