<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>商品修正(入力)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">
    <div th:replace="~{fragments/header :: header}"></div>

    <main class="container flex-grow-1 py-5">
        <h2 class="text-center mb-4">商品修正(入力)</h2>
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

                <form th:action="@{/admin/product/edit/confirm}" th:object="${productEditForm}"
                      method="post" enctype="multipart/form-data">
                    <input type="hidden" th:field="*{productId}">

                    <div class="mb-3 row">
                        <label class="col-sm-3 col-form-label text-sm-end">商品名</label>
                        <div class="col-sm-9">
                            <input type="text" class="form-control" th:field="*{name}">
                            <div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>
                    </div>
                    <div class="mb-3 row">
                        <label class="col-sm-3 col-form-label text-sm-end">単価</label>
                        <div class="col-sm-9">
                            <input type="number" class="form-control" th:field="*{price}">
                            <div class="text-danger small" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                        </div>
                    </div>
                    <div class="mb-3 row">
                        <label class="col-sm-3 col-form-label text-sm-end">在庫数</label>
                        <div class="col-sm-9">
                            <input type="number" class="form-control" th:field="*{stockQuantity}">
                            <div class="text-danger small" th:if="${#fields.hasErrors('stockQuantity')}" th:errors="*{stockQuantity}"></div>
                        </div>
                    </div>
                    <div class="mb-3 row">
                        <label class="col-sm-3 col-form-label text-sm-end">商品カテゴリ</label>
                        <div class="col-sm-9">
                            <select class="form-select" th:field="*{categoryId}">
                                <option value="">選択してください</option>
                                <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                            </select>
                            <div class="text-danger small" th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}"></div>
                        </div>
                    </div>
                    <div class="mb-4 row">
                        <label class="col-sm-3 col-form-label text-sm-end">画像</label>
                        <div class="col-sm-9">
                            <div class="mb-2" th:if="${imageUrl}">
                                <img th:src="${imageUrl}" alt="現在の画像" style="max-width:150px; max-height:150px;">
                                <div class="form-text">現在の画像</div>
                            </div>
                            <input type="file" class="form-control" th:field="*{imageFile}" accept="image/*">
                            <div class="form-text">変更する場合のみ選択（画像形式・1000px以下）</div>
                            <div class="text-danger small" th:if="${#fields.hasErrors('imageFile')}" th:errors="*{imageFile}"></div>
                        </div>
                    </div>

                    <div class="text-center">
                        <a th:href="@{/admin/product/edit/cancel}" class="btn btn-secondary px-4">キャンセル</a>
                        <button type="submit" class="btn btn-success px-4">完了</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
