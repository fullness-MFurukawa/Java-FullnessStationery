<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>

    <title>担当者アカウント登録(完了)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">
    <div th:replace="~{fragments/header :: header}"></div>

    <main class="container flex-grow-1 py-5 text-center">
        <h2 class="mb-4">アカウント登録(完了)</h2>

        <p class="fs-5"

        </p>

        <div class="mt-4">
            <a th:href="@{/admin}" class="btn btn-success px-4">メニューへ</a>
            <a th:href="@{/admin/account/form}" class="btn btn-outline-secondary px-4">入力に戻る</a>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
