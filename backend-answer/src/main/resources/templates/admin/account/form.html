<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>担当者アカウント登録(入力)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">
    <div th:replace="~{fragments/header :: header}"></div>

    <main class="container flex-grow-1 py-5">
        <h2 class="text-center mb-4">アカウント登録(入力)</h2>

        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

                <form th:action="@{/admin/account/confirm}" th:object="${accountRegisterForm}" method="post">
                    <!-- 社員名 -->
                    <div class="mb-3 row">
                        <label class="col-sm-4 col-form-label text-sm-end">社員名</label>
                        <div class="col-sm-8">
                            <select class="form-select" th:field="*{employeeId}">
                                <option value="">選択してください</option>
                                <option th:each="emp : ${employees}"
                                        th:value="${emp.id}" th:text="${emp.name}"></option>
                            </select>
                            <div class="text-danger small"
                                 th:if="${#fields.hasErrors('employeeId')}" th:errors="*{employeeId}"></div>
                        </div>
                    </div>
                    <!-- アカウント名 -->
                    <div class="mb-3 row">
                        <label class="col-sm-4 col-form-label text-sm-end">アカウント名</label>
                        <div class="col-sm-8">
                            <input type="text" class="form-control" th:field="*{accountName}"
                                   placeholder="半角英数字5〜20文字">
                            <div class="text-danger small"
                                 th:if="${#fields.hasErrors('accountName')}" th:errors="*{accountName}"></div>
                        </div>
                    </div>
                    <!-- パスワード -->
                    <div class="mb-4 row">
                        <label class="col-sm-4 col-form-label text-sm-end">パスワード</label>
                        <div class="col-sm-8">
                            <input type="password" class="form-control" th:field="*{password}"
                                   placeholder="半角英数字5〜20文字">
                            <div class="text-danger small"
                                 th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                        </div>
                    </div>

                    <div class="text-center">
                        <a th:href="@{/admin/account/cancel}" class="btn btn-secondary px-4">キャンセル</a>
                        <button type="submit" class="btn btn-success px-4">完了</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
