<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>商品カテゴリ登録(入力)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">
    <div th:replace="~{fragments/header :: header}"></div>

    <main class="container flex-grow-1 py-5">
        <h2 class="text-center mb-4">商品カテゴリ登録(入力)</h2>

        <div class="row justify-content-center">
            <div class="col-md-6">
                <form th:action="@{/admin/category/confirm}" th:object="${categoryRegisterForm}" method="post">
                    <div class="mb-4 row">
                        <label class="col-sm-4 col-form-label text-sm-end">カテゴリ名</label>
                        <div class="col-sm-8">
                            <input type="text" class="form-control" th:field="*{name}" placeholder="30文字以内">
                            <div class="text-danger small"
                                 th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>
                    </div>

                    <div class="text-center">
                        <a th:href="@{/admin/category/cancel}" class="btn btn-secondary px-4">キャンセル</a>
                        <button type="submit" class="btn btn-success px-4">完了</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
