<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>注文ステータス更新(完了)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="~{fragments/header :: header}"></div>

<main class="container flex-grow-1 py-5 text-center">
    <h2 class="mb-4">注文ステータス更新(完了)</h2>
    <p class="mb-3">注文ステータスを更新しました。</p>

    <table class="table table-bordered w-auto mx-auto text-start mb-4" style="max-width:520px;">
        <tr><th class="table-light">注文番号</th><td th:text="${orderNumber}"></td></tr>
        <tr><th class="table-light">注文ステータス</th><td th:text="${newStatusName}"></td></tr>
        <tr><th class="table-light">更新日時</th>
            <td th:text="${#temporals.format(updateDate, 'yyyy年MM月dd日 HH:mm')}"></td></tr>
    </table>

    <a th:href="@{/admin/order/search}" class="btn btn-primary">履歴検索</a>
    <a th:href="@{/admin}" class="btn btn-secondary ms-2">トップに戻る</a>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
