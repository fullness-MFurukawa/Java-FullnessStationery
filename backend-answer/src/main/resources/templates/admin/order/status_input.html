<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>注文ステータス更新(入力)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="~{fragments/header :: header}"></div>

<main class="container flex-grow-1 py-5">
    <h2 class="text-center mb-4">注文ステータス更新(入力)</h2>

    <div class="d-flex justify-content-center">
        <table class="table table-bordered w-auto">
            <tr><th class="table-light">購入日時</th>
                <td th:text="${#temporals.format(order.orderDate, 'yyyy年MM月dd日 HH:mm')}"></td></tr>
            <tr><th class="table-light">顧客アカウント名</th>
                <td th:text="|${order.customer.username}(${order.customer.name})|"></td></tr>
            <tr><th class="table-light">注文ID</th><td th:text="${order.id}"></td></tr>
            <tr><th class="table-light">合計金額</th>
                <td th:text="|${#numbers.formatInteger(order.amountTotal,1,'COMMA')}円|"></td></tr>
            <tr>
                <th class="table-light">現在のステータス</th>
                <td>
                    <div class="mb-2" th:text="${order.orderStatus.name}"></div>
                    <form th:action="@{/admin/order/status/update/confirm}"
                          th:object="${orderStatusUpdateForm}" method="post">
                        <input type="hidden" th:field="*{orderId}">
                        <div class="d-flex align-items-center gap-2">
                            <select th:field="*{newStatusId}" class="form-select" style="width:auto;">
                                <option value="">新しいステータスを選択</option>
                                <option th:each="s : ${statuses}" th:value="${s.id}" th:text="${s.name}"></option>
                            </select>
                            <button type="submit" class="btn btn-success btn-sm">ステータス更新</button>
                        </div>
                        <div class="text-danger small mt-1"
                             th:if="${#fields.hasErrors('newStatusId')}" th:errors="*{newStatusId}"></div>
                    </form>
                </td>
            </tr>
        </table>
    </div>

    <h3 class="text-center mt-4 mb-3">注文商品</h3>
    <div class="d-flex justify-content-center">
        <table class="table table-bordered w-auto text-center">
            <thead class="table-light">
                <tr><th>商品名</th><th>価格</th><th>数量</th><th>小計</th></tr>
            </thead>
            <tbody>
                <tr th:each="detail : ${order.details}">
                    <td th:text="${detail.product.name}"></td>
                    <td th:text="|${#numbers.formatInteger(detail.product.price,1,'COMMA')}円|"></td>
                    <td th:text="|${detail.count}個|"></td>
                    <td th:text="|${#numbers.formatInteger(detail.product.price * detail.count,1,'COMMA')}円|"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <h3 class="text-center mt-4 mb-3">配送先情報</h3>
    <div class="d-flex justify-content-center">
        <table class="table table-bordered w-auto">
            <tr><th class="table-light">住所</th>
                <td th:text="|${order.customer.address1} ${order.customer.address2}|"></td></tr>
            <tr><th class="table-light">電話番号</th>
                <td th:text="${order.customer.phoneNumber}"></td></tr>
        </table>
    </div>

    <div class="text-center mt-4">
        <a th:href="@{/admin/order/search}" class="btn btn-secondary">購入履歴検索へ戻る</a>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
