<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>注文ステータス更新(確認)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="~{fragments/header :: header}"></div>

<main class="container flex-grow-1 py-5">
    <h2 class="text-center mb-4">注文ステータス更新(確認)</h2>
    <p class="text-center mb-4">以下の注文のステータスを更新します。よろしいですか？</p>

    <div class="d-flex justify-content-center">
        <table class="table table-bordered w-auto">
            <tr><th class="table-light">注文ID</th><td th:text="${order.id}"></td></tr>
            <tr><th class="table-light">購入日時</th>
                <td th:text="${#temporals.format(order.orderDate, 'yyyy年MM月dd日 HH:mm')}"></td></tr>
            <tr><th class="table-light">顧客アカウント名</th>
                <td th:text="|${order.customer.username}(${order.customer.name})|"></td></tr>
            <tr><th class="table-light">現在のステータス</th><td th:text="${order.orderStatus.name}"></td></tr>
            <tr><th class="table-light">新しいステータス</th><td th:text="${newStatus.name}"></td></tr>
        </table>
    </div>

    <div class="text-center mt-4">
        <form th:action="@{/admin/order/status/update/complete}"
              th:object="${orderStatusUpdateForm}" method="post" class="d-inline">
            <input type="hidden" th:field="*{orderId}">
            <input type="hidden" th:field="*{newStatusId}">
            <button type="submit" class="btn btn-success">確定する</button>
        </form>
        <a th:href="@{/admin/order/search}" class="btn btn-secondary ms-2">戻る</a>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
