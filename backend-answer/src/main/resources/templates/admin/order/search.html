<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>購入履歴検索</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="~{fragments/header :: header}"></div>

<main class="container flex-grow-1 py-5">
    <h2 class="text-center mb-4">購入履歴検索</h2>

    <!-- 検索フォーム -->
    <form th:action="@{/admin/order/search}" th:object="${orderSearchForm}" method="get"
          class="d-flex justify-content-center align-items-center flex-wrap gap-2 mb-4">
        <label class="col-form-label">購入日</label>
        <select th:field="*{orderDate}" class="form-select" style="width:auto;">
            <option value="">選択してください</option>
            <option th:each="d : ${orderDates}"
                    th:value="${d}"
                    th:text="${#temporals.format(d, 'yyyy年MM月dd日')}"></option>
        </select>
        <label class="col-form-label">顧客アカウント名(氏名)</label>
        <select th:field="*{customerId}" class="form-select" style="width:auto;">
            <option value="">選択してください</option>
            <option th:each="c : ${customers}"
                    th:value="${c.id}"
                    th:text="|${c.username}(${c.name})|"></option>
        </select>
        <button type="submit" class="btn btn-success">検索</button>
    </form>

    <h3 class="text-center mb-3">購入履歴一覧</h3>

    <div th:if="${orders != null and !orders.isEmpty()}">
        <table class="table table-bordered align-middle text-center">
            <thead class="table-light">
                <tr>
                    <th>購入日時</th>
                    <th>顧客アカウント名(氏名)</th>
                    <th>注文内容</th>
                    <th>ステータス</th>
                    <th>ステータス更新</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="order : ${orders}">
                    <td th:text="${#temporals.format(order.orderDate, 'yyyy年MM月dd日 HH:mm')}"></td>
                    <td th:text="|${order.customer.username}(${order.customer.name})|"></td>
                    <td class="text-start">
                        <div th:text="|注文ID: ${order.id}|"></div>
                        <div th:text="|合計金額: ${#numbers.formatInteger(order.amountTotal,1,'COMMA')}円|"></div>
                        <div th:each="detail : ${order.details}"
                             th:text="|${detail.product.name} x ${detail.count}個|"></div>
                    </td>
                    <td th:text="${order.orderStatus.name}"></td>
                    <td>
                        <a th:href="@{/admin/order/status/update/{id}(id=${order.id})}"
                           class="btn btn-sm btn-outline-success">更新</a>
                    </td>
                </tr>
            </tbody>
        </table>

        <!-- ページネーション(1ページ10件) -->
        <nav th:if="${totalPages > 1}">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/admin/order/search(orderDate=${orderSearchForm.orderDate}, customerId=${orderSearchForm.customerId}, page=${currentPage - 1})}">前へ</a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link"
                       th:href="@{/admin/order/search(orderDate=${orderSearchForm.orderDate}, customerId=${orderSearchForm.customerId}, page=${i})}"
                       th:text="${i}">1</a>
                </li>
                <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/admin/order/search(orderDate=${orderSearchForm.orderDate}, customerId=${orderSearchForm.customerId}, page=${currentPage + 1})}">次へ</a>
                </li>
            </ul>
        </nav>
    </div>

    <p th:if="${orders == null or orders.isEmpty()}" class="text-center text-muted"
       th:text="${emptyMessage}">該当する注文が見つかりませんでした</p>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
