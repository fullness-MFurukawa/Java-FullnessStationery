spring.application.name=backend-answer

# =====================================================================
# データソース (PostgreSQL / fullness-ecx)
# ---------------------------------------------------------------------
# ・${VAR:default} 形式にしているため、ローカルは既定値で動作し、
#   Azure などデプロイ環境では環境変数(DB_URL / DB_USERNAME / DB_PASSWORD)で
#   上書きできます。パスワードをソースに直書きしない運用に対応。
# ・データベース名はハイフンを含む fullness-ecx。JDBC URL では
#   そのまま指定できます(引用符不要)。
# =====================================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/fullness-ecx}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:training}
spring.datasource.driver-class-name=org.postgresql.Driver

# コネクションプール(HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000

# =====================================================================
# MyBatis
# ---------------------------------------------------------------------
# ・map-underscore-to-camel-case: DBのsnake_case列を
#   JavaのcamelCaseプロパティへ自動マッピング(例 order_date → orderDate)
# ・mapper-locations: XMLマッパーの配置場所
# ・type-aliases-package: ドメインモデルのエイリアス基点パッケージ
# =====================================================================
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.mapper-locations=classpath*:mapper/**/*.xml
mybatis.type-aliases-package=jp.co.fullness.ec.backend.infrastructure.entity 

# =====================================================================
# Flyway
# ---------------------------------------------------------------------
# 今回は手動SQL(00/V1/V2)でDBを構築したため、既定では無効化しています。
# Flywayでスキーマ管理する場合は enabled=true にし、V1/V2 のSQLを
#   src/main/resources/db/migration/
# に配置してください(その場合、手動実行は 00_create_database.sql のみ)。
# =====================================================================
spring.flyway.enabled=false

# =====================================================================
# サーバ / セッション
# ---------------------------------------------------------------------
# セッション有効期限30分(画面設計のセキュリティ仕様に準拠)
# =====================================================================
server.port=8080
server.servlet.session.timeout=30m

# =====================================================================
# Thymeleaf (開発時はテンプレートキャッシュ無効)
# =====================================================================
spring.thymeleaf.cache=false

# =====================================================================
# ロギング (開発用: アプリlog と SQL の確認)
# ---------------------------------------------------------------------
# MyBatisのSQLログを見たい場合、対象マッパーのパッケージをTRACEにします。
# =====================================================================
logging.level.jp.co.fullness.ec.backend=DEBUG
logging.level.jp.co.fullness.ec.backend.infrastructure.datasource=TRACE

# =====================================================================
# AWS / S3
#   認証はコードに書かず、AWS SDK のデフォルト認証プロバイダチェーンに任せる
#   (ローカル: ~/.aws/credentials、EC2: インスタンスの IAM ロール)
# =====================================================================
aws.region=${AWS_REGION:ap-northeast-1}
aws.s3.bucket=${AWS_S3_BUCKET:fullness-ec-product-images-furukawa}
aws.s3.presign-duration-minutes=${AWS_S3_PRESIGN_MINUTES:10}

# ファイルアップロード上限
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# 再起動をまたぐセッション永続化を無効化(開発時のデシリアライズ失敗を防ぐ)
server.servlet.session.persistent=false